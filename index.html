<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apprendre l'Alphabet</title>
  <style>
    /* ─── Reset & base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --letter-size: min(50vw, 50vh);
      --radius: 24px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* ─── Confetti canvas (behind everything) ─── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Main stage ─── */
    #stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      padding: 1rem;
    }

    /* ─── Big letter card ─── */
    #letter-card {
      position: relative;
      width: var(--letter-size);
      height: var(--letter-size);
      min-width: 180px;
      min-height: 180px;
      max-width: 340px;
      max-height: 340px;
      background: var(--card);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px var(--glow, transparent),
                  0 20px 60px rgba(0,0,0,.5);
      transition: box-shadow .3s, transform .1s;
    }

    #letter-card.pop {
      animation: pop .35s cubic-bezier(.36,.07,.19,.97);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      70%  { transform: scale(.93); }
      100% { transform: scale(1); }
    }

    #letter-upper {
      font-size: max(80px, calc(var(--letter-size) * .52));
      line-height: 1;
      font-weight: 900;
      color: var(--glow, #fff);
      text-shadow: 0 0 40px var(--glow, transparent);
      transition: color .25s, text-shadow .25s;
    }

    #letter-lower {
      font-size: calc(var(--letter-size) * .22);
      line-height: 1;
      font-weight: 700;
      color: rgba(255,255,255,.55);
      margin-top: .15em;
    }

    /* ─── Hint text ─── */
    #hint {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(255,255,255,.5);
      text-align: center;
      letter-spacing: .05em;
      transition: opacity .4s;
    }

    #hint.hidden { opacity: 0; }

    /* ─── Progress bar ─── */
    #progress-area {
      width: min(90vw, 700px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
    }

    #progress-label {
      font-size: clamp(.75rem, 2.5vw, 1rem);
      color: rgba(255,255,255,.45);
    }

    #alphabet-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .alpha-dot {
      width: clamp(22px, 4vw, 34px);
      height: clamp(22px, 4vw, 34px);
      border-radius: 6px;
      background: rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(.6rem, 2vw, .85rem);
      font-weight: 700;
      color: rgba(255,255,255,.25);
      transition: background .3s, color .3s, transform .2s;
    }

    .alpha-dot.done {
      color: #fff;
      transform: scale(1.05);
    }

    /* ─── Celebration banner ─── */
    #celebration {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s;
    }

    #celebration.show {
      opacity: 1;
      pointer-events: all;
    }

    #celebration h1 {
      font-size: clamp(2.5rem, 10vw, 5rem);
      animation: bounce 1s infinite alternate;
    }

    #celebration p {
      margin-top: 1rem;
      font-size: clamp(1rem, 4vw, 1.8rem);
      color: rgba(255,255,255,.7);
    }

    #restart-btn {
      margin-top: 2rem;
      padding: .75rem 2rem;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: transform .15s;
    }

    #restart-btn:hover { transform: scale(1.06); }
    #restart-btn:active { transform: scale(.96); }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-18px); }
    }

    /* ─── Content type toggle ─── */
    #content-toggle {
      position: fixed;
      top: .8rem;
      left: .8rem;
      z-index: 5;
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      max-width: 50vw;
    }

    /* ─── Mode toggle ─── */
    #mode-toggle {
      position: fixed;
      top: .8rem;
      right: .8rem;
      z-index: 5;
      display: flex;
      gap: .4rem;
    }

    .mode-btn {
      padding: .4rem .9rem;
      font-size: .8rem;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 50px;
      background: transparent;
      color: rgba(255,255,255,.45);
      cursor: pointer;
      transition: all .2s;
    }

    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .mode-btn:hover:not(.active) {
      border-color: rgba(255,255,255,.45);
      color: rgba(255,255,255,.7);
    }

    /* ─── Quiz timer bar ─── */
    #quiz-timer-wrap {
      width: var(--letter-size);
      min-width: 180px;
      max-width: 340px;
      height: 10px;
      background: rgba(255,255,255,.1);
      border-radius: 5px;
      overflow: hidden;
      display: none;
    }

    #quiz-timer-bar {
      height: 100%;
      width: 100%;
      background: #06d6a0;
      border-radius: 5px;
      transition: background .5s;
    }

    /* ─── Quiz info row ─── */
    #quiz-info {
      display: none;
      gap: 1.5rem;
      font-size: clamp(.9rem, 2.5vw, 1.1rem);
      font-weight: 700;
      color: rgba(255,255,255,.75);
    }

    /* ─── Shake (wrong answer) ─── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      40%       { transform: translateX(10px); }
      60%       { transform: translateX(-8px); }
      80%       { transform: translateX(8px); }
    }

    #letter-card.shake {
      animation: shake .4s cubic-bezier(.36,.07,.19,.97);
    }

    /* ─── Clickable dot in explore and quiz mode ─── */
    .alpha-dot {
      cursor: pointer;
    }

    .alpha-dot:hover {
      background: rgba(255,255,255,.18);
      transform: scale(1.12);
    }

    .alpha-dot:active {
      transform: scale(.92);
    }

    /* ─── Language selector ─── */
    #lang-toggle {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: .3rem;
    }

    .lang-btn {
      padding: .3rem .55rem;
      font-size: 1.1rem;
      line-height: 1;
    }

    /* ─── GitHub star button ─── */
    #github-star {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      text-decoration: none;
    }
  </style>
</head>

        exploreBtn:  '\ud83d\udd0d \u0414\u043e\u0441\u043b\u0456\u0434\u0436\u0435\u043d\u043d\u044f',
        quizBtn:     '\ud83c\udfaf \u0412\u0456\u043a\u0442\u043e\u0440\u0438\u043d\u0430',
        pageTitle:   '\u0412\u0447\u0438\u043c\u043e \u0430\u043b\u0444\u0430\u0432\u0456\u0442',

    let currentLangKey = localStorage.getItem('lang');
    if (!currentLangKey || !LANGUAGES[currentLangKey]) currentLangKey = 'fr';
    function getLang() { return LANGUAGES[currentLangKey]; }

    // Normalise a raw key name to match the charset.
    // Special case: JS toUpperCase('ß') returns 'SS' (not 'ẞ'), which would
    // break charset matching, so both lowercase ß (U+00DF) and the rare
    // capital ẞ (U+1E9E) are mapped to the stored charset character 'ß'.
    function normalizeKey(rawKey) {
      if (rawKey === '\u00df' || rawKey === '\u1e9e') return '\u00df';
      return rawKey.toUpperCase();
    }

    // ─── Palette: one colour per letter/digit ───────────────────────────────
    const COLORS = [
      // 26 letters (A–Z)
      '#e94560','#ff6b6b','#ffa552','#ffd166','#06d6a0',
      '#1b9aaa','#4361ee','#7209b7','#f72585','#4cc9f0',
      '#90e0ef','#80b918','#e9c46a','#f4a261','#e76f51',
      '#264653','#2a9d8f','#e9c46a','#f4a261','#e76f51',
      '#e94560','#4361ee','#7209b7','#06d6a0','#ffd166','#ff6b6b',
      // 10 digits (0–9)
      '#ff9f1c','#2ec4b6','#f7b731','#fd79a8','#a29bfe',
      '#55efc4','#fdcb6e','#e17055','#74b9ff','#b8e994',
    ];

    // ─── State ───────────────────────────────────────────────────────────────
    const typed = new Set();
    const DIGITS   = '0123456789';

    let contentType = 'letters'; // 'letters' | 'digits' | 'both'

    function getCharset() {
      const alpha = getLang().alphabet.split('');
      if (contentType === 'letters') return alpha;
      if (contentType === 'digits')  return DIGITS.split('');
      return [...alpha, ...DIGITS.split('')];
    }

    // Returns the appropriate noun for the current content type.
    // pass true for plural, false for singular.
    function getContentLabel(plural) {
      const labels = getLang().contentLabel[contentType];
      return plural ? labels[1] : labels[0];
    }

    // Returns the quiz hint asking the player to press the right key.
    function getQuizHint() {
      return getLang().hintQuiz[contentType];
    }

    // ─── DOM refs ────────────────────────────────────────────────────────────
    const letterUpper    = document.getElementById('letter-upper');
    const letterLower    = document.getElementById('letter-lower');
    const letterCard     = document.getElementById('letter-card');
    const hint           = document.getElementById('hint');
    const progressLabel  = document.getElementById('progress-label');
    const alphabetRow    = document.getElementById('alphabet-row');
    const celebration    = document.getElementById('celebration');
    const restartBtn     = document.getElementById('restart-btn');
    const canvas         = document.getElementById('confetti-canvas');
    const ctx            = canvas.getContext('2d');
    const btnExplore     = document.getElementById('btn-explore');
    const btnQuiz        = document.getElementById('btn-quiz');
    const btnLetters     = document.getElementById('btn-letters');
    const btnDigits      = document.getElementById('btn-digits');
    const btnBoth        = document.getElementById('btn-both');
    const quizTimerWrap  = document.getElementById('quiz-timer-wrap');
    const quizTimerBar   = document.getElementById('quiz-timer-bar');
    const quizTimerLabel = document.getElementById('quiz-timer-label');
    const quizScoreEl    = document.getElementById('quiz-score');
    const quizInfoEl     = document.getElementById('quiz-info');

    // ─── Build character dots ────────────────────────────────────────────────
    function buildDots() {
      alphabetRow.innerHTML = '';
      getCharset().forEach((ch, i) => {
        const dot = document.createElement('div');
        dot.className = 'alpha-dot';
        dot.id = 'dot-' + ch;
        dot.textContent = ch;
        dot.style.setProperty('--dot-color', COLORS[i % COLORS.length]);
        dot.addEventListener('click', () => {
          if (audioCtx.state === 'suspended') audioCtx.resume();
          if (quizMode) {
            handleQuizKey(ch);
          } else {
            showLetter(ch);
            typed.add(ch);
            updateProgress();
            const charset = getCharset();
            if (typed.size === charset.length) {
              setTimeout(() => {
                playCelebration();
                spawnConfetti(CONFETTI_COUNT_CELEBRATION);
                celebration.classList.add('show');
              }, 400);
            }
          }
        });
        alphabetRow.appendChild(dot);
      });
    }

    // ─── Audio: tiny beep via Web Audio API ─────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq = 440, type = 'sine', duration = 0.18) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playLetterSound(index) {
      // Rising scale: C4 = 261.63 Hz; multiply by 2 semitones per letter
      // (whole-tone steps) so adjacent letters produce a clearly different pitch.
      const base = 261.63;
      const TONE_STEP = 2; // whole-tone interval (2 semitones) between letters
      const freq = base * Math.pow(1.059463, index * TONE_STEP);
      playTone(freq, 'triangle', 0.22);
    }

    function speakLetter(ch) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(ch);
      utter.lang = getLang().speechCode;
      utter.rate = 0.8;
      window.speechSynthesis.speak(utter);
    }

    function playCelebration() {
      [0, 4, 7, 12].forEach((semi, i) => {
        setTimeout(() => {
          playTone(523.25 * Math.pow(1.059463, semi), 'triangle', 0.3);
        }, i * 160);
      });
    }

    // ─── Confetti ────────────────────────────────────────────────────────────
    const CONFETTI_COUNT_SMALL       = 25;  // per-letter burst
    const CONFETTI_COUNT_DEFAULT     = 80;  // default burst size
    const CONFETTI_COUNT_CELEBRATION = 200; // full-alphabet celebration
    const CONFETTI_GRAVITY           = 0.1; // px/frame² acceleration
    const CONFETTI_MAX_VELOCITY      = 10;  // px/frame terminal velocity

    let confettiPieces = [];
    let confettiAnim   = null;

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function spawnConfetti(count = CONFETTI_COUNT_DEFAULT) {
      for (let i = 0; i < count; i++) {
        confettiPieces.push({
          x: Math.random() * canvas.width,
          y: -10,
          w: 8 + Math.random() * 8,
          h: 4 + Math.random() * 4,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          vx: (Math.random() - .5) * 4,
          vy: 3 + Math.random() * 4,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - .5) * .2,
        });
      }
      if (!confettiAnim) tickConfetti();
    }

    function tickConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);

      confettiPieces.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.rot += p.rotV;
        p.vy  = Math.min(p.vy + CONFETTI_GRAVITY, CONFETTI_MAX_VELOCITY);

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });

      if (confettiPieces.length > 0) {
        confettiAnim = requestAnimationFrame(tickConfetti);
      } else {
        confettiAnim = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    // ─── Show letter/digit ───────────────────────────────────────────────────
    function showLetter(ch) {
      const charset = getCharset();
      const index = charset.indexOf(ch);
      const color = COLORS[index % COLORS.length];

      letterCard.style.setProperty('--glow', color);
      letterUpper.textContent = ch;
      const lowerCh = ch.toLowerCase();
      letterLower.textContent = /^[0-9]$/.test(ch) ? '' : (lowerCh !== ch ? lowerCh : '');

      // Pop animation (re-trigger)
      letterCard.classList.remove('pop');
      void letterCard.offsetWidth; // reflow
      letterCard.classList.add('pop');

      hint.classList.add('hidden');
      playLetterSound(index);
      speakLetter(ch);
      spawnConfetti(CONFETTI_COUNT_SMALL);
    }

    // ─── Update progress ─────────────────────────────────────────────────────
    function updateProgress() {
      const charset = getCharset();
      progressLabel.textContent = `${typed.size} / ${charset.length} ${getContentLabel(true)}`;

      charset.forEach((ch, i) => {
        const dot = document.getElementById('dot-' + ch);
        if (!dot) return;
        if (typed.has(ch)) {
          dot.classList.add('done');
          dot.style.background = COLORS[i];
        }
      });
    }

    // ─── Keyboard handler ────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      // Resume audio context (required by browser autoplay policy)
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const key = normalizeKey(e.key);
      const charset = getCharset();
      if (!charset.includes(key)) return;

      if (quizMode) {
        handleQuizKey(key);
        return;
      }

      showLetter(key);
      typed.add(key);
      updateProgress();

      if (typed.size === charset.length) {
        setTimeout(() => {
          playCelebration();
          spawnConfetti(CONFETTI_COUNT_CELEBRATION);
          celebration.classList.add('show');
        }, 400);
      }
    });

    // ─── Quiz mode ───────────────────────────────────────────────────────────
    const QUIZ_DURATION   = 30;
    const BUZZ_FREQUENCY  = 180;
    const BUZZ_WAVEFORM   = 'sawtooth';

    let quizMode          = false;
    let quizTarget        = '';
    let quizScore         = 0;
    let quizRemaining     = [];
    let quizTimerInterval = null;
    let quizTimeLeft      = QUIZ_DURATION;
    let quizLocked        = false;

    function setMode(mode) {
      if (mode === 'quiz') {
        quizMode = true;
        btnExplore.classList.remove('active');
        btnQuiz.classList.add('active');
        startQuiz();
      } else {
        quizMode = false;
        btnExplore.classList.add('active');
        btnQuiz.classList.remove('active');
        stopQuiz();
        restart();
      }
    }

    btnExplore.addEventListener('click', () => setMode('explore'));
    btnQuiz.addEventListener('click', () => setMode('quiz'));

    function startQuiz() {
      quizScore = 0;
      // Fisher-Yates shuffle for unbiased character order
      const charset = getCharset();
      quizRemaining = [...charset];
      for (let i = quizRemaining.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [quizRemaining[i], quizRemaining[j]] = [quizRemaining[j], quizRemaining[i]];
      }
      quizTimerWrap.style.display = 'block';
      quizInfoEl.style.display = 'flex';
      alphabetRow.classList.add('quiz-active');
      // Reset explore-mode progress
      typed.clear();
      charset.forEach(ch => {
        const dot = document.getElementById('dot-' + ch);
        if (!dot) return;
        dot.classList.remove('done');
        dot.style.background = '';
      });
      startNextQuizLetter();
    }

    function stopQuiz() {
      clearInterval(quizTimerInterval);
      quizTimerInterval = null;
      quizTimerWrap.style.display = 'none';
      quizInfoEl.style.display = 'none';
      alphabetRow.classList.remove('quiz-active');
    }

    function startNextQuizLetter() {
      if (quizRemaining.length === 0) {
        stopQuiz();
        setTimeout(() => {
          playCelebration();
          spawnConfetti(CONFETTI_COUNT_CELEBRATION);
          const charset = getCharset();
          const found = getLang().quizFoundAll[contentType];
          document.querySelector('#celebration p').textContent =
            getLang().quizScoreMsg(found, quizScore, charset.length);
          celebration.classList.add('show');
        }, 400);
        return;
      }

      quizLocked = false;
      quizTarget = quizRemaining.pop();
      quizTimeLeft = QUIZ_DURATION;

      showQuizLetter(quizTarget);
      updateQuizUI();

      clearInterval(quizTimerInterval);
      quizTimerInterval = setInterval(() => {
        quizTimeLeft--;
        updateQuizUI();
        if (quizTimeLeft <= 0) {
          clearInterval(quizTimerInterval);
          quizTimerInterval = null;
          onQuizTimeout();
        }
      }, 1000);
    }

    function showQuizLetter(ch) {
      const charset = getCharset();
      const index = charset.indexOf(ch);
      const color = COLORS[index % COLORS.length];

      letterCard.style.setProperty('--glow', color);
      letterUpper.textContent = ch;
      const lowerCh = ch.toLowerCase();
      letterLower.textContent = /^[0-9]$/.test(ch) ? '' : (lowerCh !== ch ? lowerCh : '');

      letterCard.classList.remove('pop');
      void letterCard.offsetWidth; // reflow to restart animation
      letterCard.classList.add('pop');

      hint.textContent = getQuizHint();
      hint.classList.remove('hidden');

      playLetterSound(index);
      speakLetter(ch);
    }

    function updateQuizUI() {
      const pct = (quizTimeLeft / QUIZ_DURATION) * 100;
      quizTimerBar.style.width = pct + '%';
      if (pct > 60)      quizTimerBar.style.background = '#06d6a0';
      else if (pct > 30) quizTimerBar.style.background = '#ffd166';
      else               quizTimerBar.style.background = '#e94560';
      quizTimerLabel.textContent = `⏱ ${quizTimeLeft}s`;
      quizScoreEl.textContent = `⭐ ${quizScore}`;
    }

    function onQuizTimeout() {
      if (quizLocked) return;
      quizLocked = true;

      letterCard.classList.remove('shake');
      void letterCard.offsetWidth; // reflow to restart animation
      letterCard.classList.add('shake');
      playTone(BUZZ_FREQUENCY, BUZZ_WAVEFORM, 0.4);

      hint.textContent = getLang().wasIt(quizTarget);

      setTimeout(() => {
        letterCard.classList.remove('shake');
        startNextQuizLetter();
      }, 1500);
    }

    function handleQuizKey(key) {
      if (quizLocked) return;

      if (key === quizTarget) {
        quizLocked = true;
        quizScore++;
        clearInterval(quizTimerInterval);
        quizTimerInterval = null;

        // Celebrate correct answer
        letterCard.classList.remove('pop');
        void letterCard.offsetWidth; // reflow to restart animation
        letterCard.classList.add('pop');
        const charset = getCharset();
        playLetterSound(charset.indexOf(key));
        spawnConfetti(CONFETTI_COUNT_SMALL);

        // Mark dot as found
        const dot = document.getElementById('dot-' + key);
        dot.classList.add('done');
        dot.style.background = COLORS[charset.indexOf(key) % COLORS.length];

        updateQuizUI();
        hint.textContent = getLang().correct;

        setTimeout(() => {
          startNextQuizLetter();
        }, 1200);
      } else {
        // Wrong answer
        letterCard.classList.remove('shake');
        void letterCard.offsetWidth; // reflow to restart animation
        letterCard.classList.add('shake');
        playTone(BUZZ_FREQUENCY, BUZZ_WAVEFORM, 0.2);
        hint.textContent = getLang().tryAgain;
        setTimeout(() => {
          if (!quizLocked) {
            hint.textContent = getQuizHint();
          }
        }, 600);
      }
    }

    // ─── Restart ─────────────────────────────────────────────────────────────
    function restart() {
      typed.clear();
      letterUpper.textContent = '?';
      letterLower.textContent = '';
      letterCard.style.setProperty('--glow', 'transparent');
      hint.textContent = getLang().hintExplore;
      hint.classList.remove('hidden');
      document.querySelector('#celebration p').textContent = getLang().celebText[contentType];
      celebration.classList.remove('show');
      getCharset().forEach(ch => {
        const dot = document.getElementById('dot-' + ch);
        if (!dot) return;
        dot.classList.remove('done');
        dot.style.background = '';
      });
      updateProgress();
      confettiPieces = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    restartBtn.addEventListener('click', () => {
      if (quizMode) {
        celebration.classList.remove('show');
        confettiPieces = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        startQuiz();
      } else {
        restart();
      }
    });

    // ─── Content type toggle ────────────────────────────────────────────────
    function setContentType(type) {
      contentType = type;
      btnLetters.classList.toggle('active', type === 'letters');
      btnDigits.classList.toggle('active', type === 'digits');
      btnBoth.classList.toggle('active', type === 'both');
      buildDots();
      if (quizMode) {
        stopQuiz();
        startQuiz();
      } else {
        restart();
      }
    }

    btnLetters.addEventListener('click', () => setContentType('letters'));
    btnDigits.addEventListener('click',  () => setContentType('digits'));
    btnBoth.addEventListener('click',    () => setContentType('both'));

    // ─── Language toggle ────────────────────────────────────────────────────
    function setLanguage(key) {
      currentLangKey = key;
      localStorage.setItem('lang', key);
      const lang = getLang();

      // Update document language and title
      document.documentElement.lang = lang.htmlLang;
      document.title = lang.pageTitle;

      // Update content-toggle button labels
      btnLetters.textContent = lang.lettersBtn;
      btnLetters.setAttribute('aria-label', lang.lettersBtn);
      btnDigits.textContent = lang.digitsBtn;
      btnDigits.setAttribute('aria-label', lang.digitsBtn);
      btnBoth.textContent = lang.bothBtn;
      btnBoth.setAttribute('aria-label', lang.bothBtn);

      // Update mode-toggle button labels
      btnExplore.textContent = lang.exploreBtn;
      btnQuiz.textContent = lang.quizBtn;

      // Update celebration overlay
      document.querySelector('#celebration h1').textContent = lang.celebTitle;
      restartBtn.textContent = lang.restartBtn;

      // Highlight active language button
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === key);
      });

      // Rebuild dots for new alphabet and restart current mode
      buildDots();
      if (quizMode) {
        stopQuiz();
        startQuiz();
      } else {
        restart();
      }
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    // ─── Init ────────────────────────────────────────────────────────────────
    setLanguage(currentLangKey);
    updateProgress();

    // ─── GitHub star count ───────────────────────────────────────────────────
    fetch('https://api.github.com/repos/sunix/apprendre-alphabet')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        if (typeof data.stargazers_count === 'number') {
          document.getElementById('star-count').textContent = data.stargazers_count;
        }
      })
      .catch(() => { /* silently ignore network errors */ });
  </script>
</body>
</html>
